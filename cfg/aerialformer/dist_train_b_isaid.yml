apiVersion: batch/v1
kind: Job
metadata:
  name: af-b-isaid
spec:

  template:
    spec:

      containers:
        - name: bench-box
          image: docker.io/cimartinezvillar/benchmark-trainer:cuda11.7base
          imagePullPolicy: Always

          resources:
            limits:
              memory: 64G
              cpu: 8
              nvidia.com/gpu: 2
              ephemeral-storage: 75G #isaid: 32GB + ~43 .pth(~25GB)?
            requests:
              memory: 64G
              cpu: 8
              nvidia.com/gpu: 2
              ephemeral-storage: 75G

          volumeMounts:
            - mountPath: /data_pvc
              name: zipped-vol

            - mountPath: /log_pvc
              name: log-vol

            - mountPath: /dev/shm
              name: dshm              

          command: ["/bin/sh","-c"]
          args:
          - |
            git clone https://github.com/carlosmartinezvillar/AerialFormer.git;
            cd AerialFormer;
            pip install -v -e .;
            echo "Copying data...";            
            mkdir ./data;
            cp -v /data_pvc/isaid.zip ./data/;
            unzip -q ./data/isaid.zip -d ./data/;
            rm ./data/isaid.zip;
            bash ./tools/dist_train.sh configs/aerialformer/aerialformer_base_896x896_isaid.py 2 \
              --cfg-options data.samples_per_gpu=4 data.workers_per_gpu=4;
            cp -r ./work_dirs /log_pvc;
            mv /log_pvc/work_dirs /log_pvc/aerialformer_b_isaid;

      volumes:
      - name: zipped-vol
        persistentVolumeClaim:
          claimName: lake-benchmark-data

      - name: log-vol
        persistentVolumeClaim:
          claimName: lake-benchmark-logs

      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 8G

      restartPolicy: Never

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                - key: nvidia.com/gpu.product
                  operator: In
                  values:
                  - Tesla-V100-SXM2-32GB
                  # - NVIDIA-GeForce-RTX-3090
                  # - Tesla-V100-PCIE-16GB
                  # - Tesla-V100-SXM2-16GB

  backoffLimit: 0