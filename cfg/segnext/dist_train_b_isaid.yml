apiVersion: batch/v1
kind: Job
metadata:
  name: segnext-b-isaid
spec:

  template:
    spec:

      containers:
        - name: bench-box
          image: docker.io/cimartinezvillar/benchmark-trainer:segnext
          imagePullPolicy: Always

          resources:
            limits:
              memory: 56G
              cpu: 8
              nvidia.com/gpu: 2
              # nvidia.com/rtxa6000: 2           
              ephemeral-storage: 75G #isaid: ~75GB? (32GB + ~32 .pth(~25GB))
            requests:
              memory: 56G
              cpu: 8
              nvidia.com/gpu: 2
              # nvidia.com/rtxa6000: 2            
              ephemeral-storage: 75G

          volumeMounts:
            - mountPath: /data_pvc
              name: zipped-vol

            - mountPath: /log_pvc
              name: log-vol

            - mountPath: /dev/shm
              name: dshm              

          command: ["/bin/sh","-c"]
          args:
          - |
            git clone https://github.com/carlosmartinezvillar/SegNeXt.git;
            cd SegNeXt;
            pip install -v -e .;
            echo "Copying weights...";
            mkdir ./pretrained;
            cp -v /log_pvc/segnext_base_512x512_ade_160k.pth ./pretrained/;
            echo "Copying data...";
            mkdir ./data;
            cp -v /data_pvc/isaid.zip ./data/;
            unzip -q ./data/isaid.zip -d ./data/;
            rm ./data/isaid.zip;
            bash ./tools/dist_train.sh ./local_configs/downstream/segnext_b_isaid.py 2 \
              --cfg-options data.samples_per_gpu=4 data.workers_per_gpu=4 optim_wrapper.optimizer.lr=0.00003;
            mv ./work_dirs ./segnext_b_isaid;
            cp -rv ./segnext_b_isaid /log_pvc;

      volumes:
      - name: zipped-vol
        persistentVolumeClaim:
          claimName: lake-benchmark-data

      - name: log-vol
        persistentVolumeClaim:
          claimName: lake-benchmark-logs

      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 8G

      restartPolicy: Never

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions: 
                - key: nvidia.com/gpu.product
                  operator: In
                  values:
                  # - NVIDIA-GeForce-RTX-3090
                  # - Tesla-V100-PCIE-16GB
                  # - Tesla-V100-SXM2-16GB
                  - Tesla-V100-SXM2-32GB
                  # - NVIDIA-RTX-A6000



  backoffLimit: 0