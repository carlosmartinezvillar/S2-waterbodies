apiVersion: batch/v1
kind: Job
metadata:
  name: d-segnext-b-potsdam
spec:

  template:
    spec:

      containers:
        - name: bench-box
          image: docker.io/cimartinezvillar/benchmark-trainer:segnext
          imagePullPolicy: Always

          resources:
            limits:
              memory: 48G
              cpu: 8
              nvidia.com/gpu: 2             
              ephemeral-storage: 50G #isaid: ~75GB? (32GB + ~32 .pth(~25GB))
            requests:
              memory: 48G
              cpu: 8
              nvidia.com/gpu: 2             
              ephemeral-storage: 50G

          volumeMounts:
            - mountPath: /data_pvc
              name: zipped-vol

            - mountPath: /log_pvc
              name: log-vol

            - mountPath: /dev/shm
              name: dshm              

          command: ["/bin/sh","-c"]
          args:
          - git clone https://github.com/carlosmartinezvillar/SegNeXt.git;
            cd SegNeXt;
            pip install -v -e .;
            echo "Copying weights...";
            mkdir ./pretrained;
            cp /log_pvc/segnext_base_512x512_ade_160k.pth ./pretrained/;
            echo "Copying data...";
            mkdir ./data;
            cp /data_pvc/6potsdam.zip ./data/;
            unzip -q ./data/6potsdam.zip -d ./data/;
            rm ./data/6potsdam.zip;
            bash ./tools/dist_train.sh ./local_configs/downstream/segnext_b_6potsdam.py 2;
            cp -r ./work_dirs /log_pvc;
            mv /log_pvc/work_dirs /log_pvc/segnext_b_6potsdam;

      volumes:
      - name: zipped-vol
        persistentVolumeClaim:
          claimName: lake-benchmark-data

      - name: log-vol
        persistentVolumeClaim:
          claimName: lake-benchmark-logs

      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 8G

      restartPolicy: Never

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions: 
                - key: nvidia.com/gpu.product
                  operator: In
                  values:
                  # - NVIDIA-GeForce-RTX-3090
                  # - Tesla-V100-PCIE-16GB
                  # - Tesla-V100-SXM2-16GB
                  - Tesla-V100-SXM2-32GB


  backoffLimit: 0